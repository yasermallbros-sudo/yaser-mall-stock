services:
  - type: web
    name: yaser-mall-stock
    runtime: node
    plan: starter
    buildCommand: npm ci && npx prisma generate && npx prisma migrate deploy && npm run db:seed && npm run build
    startCommand: npm run start -- -p $PORT
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: yaser-mall-stock-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: SCRAPER_MAX_PRODUCTS
        value: "1200"
      - key: LIVE_SYNC_MAX_PRODUCTS
        value: "1200"

databases:
  - name: yaser-mall-stock-db
    plan: starter

services:
  - type: web
    name: yaser-mall-stock
    runtime: node
    plan: starter
    buildCommand: npm ci && npx prisma generate && npx prisma db push && npm run db:seed && npm run build
    startCommand: npm run start -- -p $PORT
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: yaser-mall-stock-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: SCRAPER_MAX_PRODUCTS
        value: "0"
      - key: LIVE_SYNC_MAX_PRODUCTS
        value: "0"
      - key: CRON_SECRET
        value: yaser-mall-nightly-sync-2026

  - type: cron
    name: yaser-mall-stock-nightly-sync
    runtime: node
    plan: starter
    schedule: "0 21 * * *"
    buildCommand: npm ci
    startCommand: node scripts/nightly-sync.mjs
    envVars:
      - key: APP_URL
        value: https://yaser-mall-stock.onrender.com
      - key: CRON_SECRET
        value: yaser-mall-nightly-sync-2026

databases:
  - name: yaser-mall-stock-db
    plan: basic-256mb

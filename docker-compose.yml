services:
  postgres:
    image: postgres:16-alpine
    container_name: yaser-mall-stock-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: yaser_mall_stock
    ports:
      - "5432:5432"
    volumes:
      - yaser_mall_stock_data:/var/lib/postgresql/data
volumes:
  yaser_mall_stock_data:
